version: '3.8'

# Только для локальной разработки.
# На продакшене всегда использовать:
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d
# или: ./scripts/docker-compose-up.sh / ./scripts/rebuild.sh
# Для локального запуска скопируйте .env.example в .env в корне репозитория.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-kidney_office}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-kidney_office}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-kidney_office}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://kidney-office.srvu.ru}
      API_BASE_URL: ${API_BASE_URL:-https://kidney-office.srvu.ru}
      SCREENS_APK_PATH: apk/kidney-office-tv.apk
      SEED_ADMIN_LOGIN: ${SEED_ADMIN_LOGIN:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@localhost}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://141.105.65.20:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:32b}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-45000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_PASSWORD: ${TELEGRAM_BOT_PASSWORD:-}
    volumes:
      - ../backend/apk:/app/apk:ro
      - ../backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: ["node", "dist/resume/resume.telegram.worker.js"]
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-kidney_office}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://141.105.65.20:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:32b}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-45000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_PASSWORD: ${TELEGRAM_BOT_PASSWORD:-}
    volumes:
      - ../backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
