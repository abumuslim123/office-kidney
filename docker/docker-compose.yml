version: '3.8'

# Только для локальной разработки.
# На продакшене всегда использовать:
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d
# или: ./scripts/docker-compose-up.sh / ./scripts/rebuild.sh
# Для локального запуска скопируйте .env.example в .env в корне репозитория.

services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-kidney_office}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-kidney_office}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ../backend/apk:/app/apk:ro
      - ../backend/uploads:/app/uploads
      - ${DB_BACKUP_HOST_DIR:-../backups/postgres}:/backups:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: ["node", "dist/resume/resume.telegram.worker.js"]
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ../backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
