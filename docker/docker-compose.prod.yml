# Production compose for kidney-office.srvu.ru
# SSL: Caddy получает сертификаты Let's Encrypt автоматически для DOMAIN.
# Usage: from repo root: cp .env.production.example .env.production && fill secrets, then:
#   docker-compose -f docker/docker-compose.prod.yml --env-file .env.production up -d

version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-kidney-office.srvu.ru}
      ACME_AGREE: "true"
    restart: unless-stopped
    depends_on:
      - frontend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Не пробрасывать порт наружу в продакшне — доступ только из backend
    # ports: ["5432:5432"]

  # Синхронизация пароля роли в существующем томе Postgres.
  # Важно: работает без создания новой БД и без удаления тома.
  # Требует, чтобы DB_USERNAME был суперпользователем (обычно postgres).
  db_password_sync:
    image: postgres:16-alpine
    env_file:
      - ../.env.production
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USERNAME}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -euc
      - |
        echo "Syncing DB role password..."
        if [ -z "$$DB_USERNAME" ] || [ -z "$$DB_PASSWORD" ] || [ -z "$$DB_DATABASE" ]; then
          echo "ERROR: DB_USERNAME/DB_PASSWORD/DB_DATABASE must be set (check .env.production)" >&2
          exit 1
        fi
        esc_pass="$$(printf "%s" "$$DB_PASSWORD" | sed "s/'/''/g")"
        if [ -z "$$esc_pass" ]; then
          echo "ERROR: Refusing to set empty password" >&2
          exit 1
        fi
        psql -v ON_ERROR_STOP=1 \
          -c "ALTER USER \"$$DB_USERNAME\" WITH PASSWORD '$$esc_pass';"
        echo "DB role password synced."
    restart: "no"

  db_backup:
    build:
      context: ..
      dockerfile: docker/Dockerfile.db-backup
    env_file:
      - ../.env.production
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USERNAME}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_DATABASE}
      DB_BACKUP_CRON: ${DB_BACKUP_CRON:-0 0 * * *}
      DB_BACKUP_RETENTION_DAYS: ${DB_BACKUP_RETENTION_DAYS:-30}
      DB_BACKUP_DIR: ${DB_BACKUP_DIR:-/backups}
    volumes:
      - ${DB_BACKUP_HOST_DIR:-../backups/postgres}:${DB_BACKUP_DIR:-/backups}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
      db_password_sync:
        condition: service_completed_successfully
    volumes:
      - ../backend/apk:/app/apk:ro
      - ../backend/uploads:/app/uploads
    # Чтобы backend резолвил внутренний Bitrix (например bitrix*.kidney.srvu.ru), добавьте dns:
    # с IP вашего DNS, обязательно оставив 127.0.0.11 (DNS Docker для имён postgres и т.д.):
    # dns:
    #   - 127.0.0.11
    #   - 192.168.x.x
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Порт только внутри сети — снаружи доступ через nginx
    expose:
      - "3000"

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: ["node", "dist/resume/resume.telegram.worker.js"]
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ../backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      db_password_sync:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        - VITE_API_URL=/api
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
